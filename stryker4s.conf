stryker4s {
  mutate = [
    "**/main/scala/**/*.scala",
    "!**/Main.scala",
    "!**/TablebaseClientLive.scala",
    "!**/kafka/EngineStream.scala",
    "!**/maichess/engine/chess/*.scala",
    "!**/maichess/engine/chess/SearchV3.scala",
    "!**/maichess/engine/chess/EvalV2.scala"
  ]

  scala-dialect = "scala3"

  # Aggressive timeout: kill hanging mutants fast (formula: netTime * timeout-factor + timeout).
  timeout = 1000
  timeout-factor = 1.0

  reporters = ["console", "html"]

  thresholds {
    high = 80
    low = 60
    break = 0
  }

  excluded-mutations = []
}
